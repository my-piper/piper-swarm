---

volumes:
  mongo-data:

networks:
  monitoring:
    driver: overlay
  database:
    driver: overlay

services:
  mongo:
    image: mongo:8.2.6
    networks:
      - database
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    deploy:
      placement:
        constraints:
          - node.labels.mongo==true

  exporter-mongo:
    image: percona/mongodb_exporter:0.41.2
    command:
      - "--mongodb.uri=mongodb://mongo:27017"
      - "--compatible-mode"
      - "--discovering-mode"
      - "--collect-all"
    networks:
      - database
      - monitoring
    deploy:
      labels:
        - "prometheus-job=mongo"
        - "prometheus-port=9216"
