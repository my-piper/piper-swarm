---

volumes:
  clickhouse-data:
  clickhouse-logs:

services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.1
    networks:
      - database
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: piper
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ../config/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
      - ../config/clickhouse/users.d:/etc/clickhouse-server/users.d:ro
      - /var/backups/piper/clickhouse:/var/lib/clickhouse/backups
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      placement:
        constraints:
          - node.labels.clickhouse==true
